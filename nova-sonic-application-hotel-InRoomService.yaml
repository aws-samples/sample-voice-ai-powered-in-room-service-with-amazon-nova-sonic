AWSTemplateFormatVersion: '2010-09-09'
Description: 'Hotel In-Room Service Application - Complete embedded menu with AI image generation and descriptions. Requires successful deployment of infrastructure stack.'

Parameters:
  InfrastructureStackName:
    Type: String
    Description: 'Name of the infrastructure stack to import values from'    

Resources:
  # ========================================
  # Dead Letter Queue for Lambda Functions
  # ========================================
  
  LambdaDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-lambda-dlq'
      MessageRetentionPeriod: 1209600  # 14 days
      KmsMasterKeyId: alias/aws/sqs

  LambdaDeadLetterQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref LambdaDeadLetterQueue
      PolicyDocument:
        Statement:
          - Effect: Deny
            Principal: "*"
            Action: "sqs:*"
            Resource: !GetAtt LambdaDeadLetterQueue.Arn
            Condition:
              Bool:
                "aws:SecureTransport": "false"

  HotelMenuLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.lambda_handler
      Role:
        Fn::ImportValue: !Sub "${InfrastructureStackName}-LambdaRole"
      Timeout: 900
      MemorySize: 1024
      ReservedConcurrentExecutions: 10
      DeadLetterConfig:
        TargetArn: !GetAtt LambdaDeadLetterQueue.Arn
      Environment:
        Variables:
          BUCKET_NAME:
            Fn::ImportValue: !Sub "${InfrastructureStackName}-MenuImagesBucket"
          CLOUDFRONT_DOMAIN:
            Fn::ImportValue: !Sub "${InfrastructureStackName}-CloudFrontDomain"
          NOVA_MODEL_ID: 'stability.stable-image-core-v1:1'
          BEDROCK_REGION: 'us-west-2'
      KmsKeyArn:
        Fn::ImportValue: !Sub "${InfrastructureStackName}-KMSKeyArn"
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse
          import base64
          import os
          
