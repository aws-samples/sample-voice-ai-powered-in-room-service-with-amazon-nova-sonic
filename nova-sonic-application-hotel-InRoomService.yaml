              "categoryMapping": {
                  "bf": "Breakfast",
                  "ln": "lunch", 
                  "dn": "dinner",
                  "bv": "beverages",
                  "hk": "housekeeping",
                  "sp": "spa",
                  "am": "amenities"
              },
